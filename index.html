<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<!-- CACHE BUSTING META TAGS -->
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">

<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Sillage%22%2C%22short_name%22%3A%22Sillage%22%2C%22start_url%22%3A%22.%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23000000%22%2C%22theme_color%22%3A%22%23000000%22%7D">
<title>Sillage | Olfactory Ledger</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-dark: #000000;
    --surface: #0a0a0a;
    --border: #1a1a1a;
    --border-light: #2a2a2a;
    --text-primary: #F2EFE9;
    --text-secondary: #8C8881;
    --accent-gold: #C5A059;
    --accent-gold-dim: rgba(197, 160, 89, 0.1);
    --font-serif: 'Cormorant Garamond', serif;
    --font-sans: 'Montserrat', sans-serif;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { background: var(--bg-dark); height: 100%; overscroll-behavior: none; }
  body {
    background: var(--bg-dark); color: var(--text-primary);
    font-family: var(--font-sans);
    min-height: 100vh; min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }

  .pwa-toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
    background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px);
    border: 1px solid var(--border-light); border-radius: 30px;
    padding: 12px 24px; font-size: 10px; letter-spacing: 1px; color: var(--text-primary);
    display: flex; align-items: center; gap: 12px; z-index: 1000;
    transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .pwa-toast.show { transform: translateX(-50%) translateY(0); }
  .pwa-toast button { background: none; border: none; color: var(--accent-gold); cursor: pointer; font-family: var(--font-sans); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }

  ::-webkit-scrollbar { display: none; }
  
  .app { max-width: 600px; margin: 0 auto; padding: 40px 20px 120px; }

  /* Header */
  .header { text-align: center; margin-bottom: 40px; }
  .header-eyebrow { font-size: 9px; font-weight: 500; letter-spacing: 4px; color: var(--accent-gold); text-transform: uppercase; margin-bottom: 12px; }
  .header-title { font-family: var(--font-serif); font-size: 42px; font-weight: 300; letter-spacing: 8px; color: var(--text-primary); text-indent: 8px; margin-bottom: 16px; }
  .header-count { font-size: 11px; color: var(--text-secondary); letter-spacing: 1px; font-weight: 300; text-transform: uppercase; }
  .header-count .count-num { color: var(--text-primary); font-weight: 500; }
  .divider { width: 1px; height: 12px; background: var(--accent-gold); margin: 20px auto; opacity: 0.3; }

  /* Tabs */
  .tabs { display: flex; justify-content: center; gap: 30px; margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 16px; }
  .tab-btn {
    background: transparent; border: none; color: var(--text-secondary); 
    font-size: 10px; font-weight: 400; letter-spacing: 2px; text-transform: uppercase;
    font-family: var(--font-sans); cursor: pointer; transition: all 0.3s ease; position: relative;
  }
  .tab-btn::after {
    content: ''; position: absolute; bottom: -17px; left: 50%; transform: translateX(-50%);
    width: 0; height: 1px; background: var(--accent-gold); transition: width 0.3s ease;
  }
  .tab-btn.active { color: var(--text-primary); }
  .tab-btn.active::after { width: 100%; }

  /* Seasons Section */
  .season { margin-bottom: 60px; }
  .season-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; padding-bottom: 8px; border-bottom: 1px solid var(--border); }
  .season-title { font-family: var(--font-serif); font-size: 20px; font-style: italic; color: var(--text-primary); display: flex; align-items: center; gap: 8px; }
  .season-title span { font-style: normal; font-size: 12px; opacity: 0.5; }
  .season-count { font-size: 10px; color: var(--text-secondary); letter-spacing: 2px; }

  /* Grid Layout */
  .slots { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px 10px; align-items: start; }
  
  /* Fragrance Card */
  .frag-card { display: flex; flex-direction: column; align-items: center; position: relative; }
  
  /* The Bottle (Hero Image) */
  .slot {
    height: 110px; width: 100%; position: relative; display: flex; align-items: flex-end; justify-content: center;
    transition: all 0.4s ease;
  }
  
  /* Filled State */
  .frag-card:hover .slot.filled { transform: translateY(-4px); }
  .slot-img-wrap { 
    height: 90px; width: auto; position: relative; display: flex; justify-content: center;
  }
  /* Elegant glass shadow */
  .slot-img-wrap::after {
    content: ''; position: absolute; bottom: -8px; left: 50%; transform: translateX(-50%);
    width: 60%; height: 6px; background: rgba(0,0,0,0.8); filter: blur(4px); border-radius: 50%;
  }
  .frag-img { height: 100%; width: auto; object-fit: contain; filter: drop-shadow(0 10px 15px rgba(0,0,0,0.5)); }
  
  /* Empty State */
  .frag-card.empty-card { cursor: pointer; opacity: 0.4; transition: opacity 0.3s; }
  .frag-card.empty-card:hover { opacity: 0.8; }
  .slot.empty { 
    height: 90px; border-bottom: 1px solid var(--border-light); align-items: center; background: radial-gradient(circle at 50% 50%, #111 0%, transparent 60%);
  }
  .empty-icon { font-size: 18px; font-weight: 300; color: var(--text-secondary); }

  /* Text Details (Title Casing applied via CSS) */
  .slot-details { margin-top: 16px; text-align: center; display: flex; flex-direction: column; align-items: center; width: 100%; }
  .slot-name { 
    font-family: var(--font-serif); font-size: 16px; font-weight: 400; line-height: 1.2; 
    margin-bottom: 6px; color: var(--text-primary); text-transform: capitalize;
  }
  .slot-house { font-size: 8px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1.5px; }
  .stars { color: var(--accent-gold); font-size: 8px; margin-top: 8px; letter-spacing: 2px; }
  .stars-empty { color: #333; }

  /* Hover Actions */
  .slot-actions {
    position: absolute; top: 0; left: 50%; transform: translateX(-50%);
    height: 110px; width: 80%; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px);
    display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 10px;
    opacity: 0; visibility: hidden; transition: all 0.2s ease; border-radius: 4px; z-index: 10;
  }
  .frag-card:hover .slot-actions { opacity: 1; visibility: visible; }
  .action-btn {
    background: transparent; border: 1px solid var(--border-light); border-radius: 30px;
    color: var(--text-primary); padding: 6px 16px; font-size: 8px; font-family: var(--font-sans);
    text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.2s ease; width: 80%;
  }
  .action-btn:hover { background: var(--text-primary); color: var(--bg-dark); }
  .action-btn.delete:hover { background: #3a1a1a; border-color: #5a1a1a; color: white; }

  /* Lists (Discovery/Wishlist) */
  .frag-list { display: flex; flex-direction: column; gap: 12px; }
  .frag-item {
    background: transparent; border-bottom: 1px solid var(--border); padding: 20px 0;
    display: flex; align-items: center; gap: 24px; position: relative; transition: all 0.3s ease;
  }
  .frag-item-img { height: 70px; width: auto; object-fit: contain; filter: drop-shadow(0 5px 10px rgba(0,0,0,0.4)); flex-shrink: 0;}
  .frag-item-info { flex: 1; display: flex; flex-direction: column; justify-content: center; }
  .frag-item-house { font-size: 9px; color: var(--accent-gold); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 4px; }
  .frag-item-name { font-family: var(--font-serif); font-size: 22px; font-weight: 300; color: var(--text-primary); margin-bottom: 6px; text-transform: capitalize;}
  .frag-item-notes { font-size: 11px; color: var(--text-secondary); font-style: italic; }
  
  .badge { align-self: flex-start; font-size: 8px; text-transform: uppercase; letter-spacing: 1px; padding: 4px 8px; border-radius: 2px; border: 1px solid currentColor; margin-top: 10px; }
  .badge.cooling { color: var(--text-secondary); border-color: var(--border-light); }
  .badge.ready { color: var(--accent-gold); border-color: var(--accent-gold-dim); background: rgba(197, 160, 89, 0.05); }

  /* Fixed Floating Add Button - Elegant */
  .fab-wrap { position: fixed; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; pointer-events: none; z-index: 100; }
  .add-btn {
    background: rgba(15, 15, 15, 0.8); backdrop-filter: blur(10px); pointer-events: auto;
    border: 1px solid var(--border-light); border-radius: 30px; padding: 14px 32px;
    color: var(--accent-gold); font-size: 9px; font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
    font-family: var(--font-sans); cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; gap: 8px;
  }
  .add-btn::before { content: '+'; font-size: 14px; font-weight: 300; }
  .add-btn:hover { border-color: var(--accent-gold); background: rgba(20, 20, 20, 0.95); }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center; padding: 20px; z-index: 200; opacity: 0; visibility: hidden; transition: all 0.4s ease;
  }
  .modal-overlay.active { opacity: 1; visibility: visible; }
  .modal {
    background: var(--bg-dark); border: 1px solid var(--border-light); border-radius: 8px;
    padding: 30px; width: 100%; max-width: 400px; transform: translateY(20px) scale(0.98); opacity: 0; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    max-height: 85vh; overflow-y: auto; box-shadow: 0 30px 60px rgba(0,0,0,0.8);
  }
  .modal-overlay.active .modal { transform: translateY(0) scale(1); opacity: 1; }
  .modal-title { font-family: var(--font-serif); font-size: 24px; font-weight: 300; color: var(--accent-gold); margin-bottom: 30px; text-align: center; font-style: italic; }

  .field { margin-bottom: 24px; }
  .field-label { font-size: 9px; font-weight: 500; letter-spacing: 2px; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 10px; display: block; }
  .field-input {
    width: 100%; background: transparent; border: none; border-bottom: 1px solid var(--border-light);
    padding: 8px 0; color: var(--text-primary); font-size: 16px; font-family: var(--font-serif); 
    outline: none; transition: border-color 0.3s; border-radius: 0;
  }
  .field-input:focus { border-bottom-color: var(--accent-gold); }
  
  /* Image Upload Custom */
  .img-upload-container { display: flex; align-items: flex-end; gap: 20px; }
  .img-preview-box { width: 40px; height: 60px; display: flex; align-items: center; justify-content: center; }
  .img-preview-box img { max-height: 100%; max-width: 100%; object-fit: contain; }
  .file-btn { background: transparent; border: 1px solid var(--border-light); border-radius: 30px; padding: 8px 16px; color: var(--text-secondary); font-size: 9px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; }
  .file-btn:hover { border-color: var(--accent-gold); color: var(--accent-gold); }
  .file-input { display: none; }

  /* Segmented Controls */
  .seg-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .seg-btn {
    flex: 1; min-width: 80px; padding: 10px; font-size: 9px; letter-spacing: 1.5px;
    border: 1px solid var(--border-light); background: transparent; border-radius: 4px;
    color: var(--text-secondary); cursor: pointer; font-family: var(--font-sans); text-transform: uppercase; transition: all 0.2s; text-align: center;
  }
  .seg-btn.active-status { background: var(--text-primary); color: var(--bg-dark); border-color: var(--text-primary); }
  .seg-btn.active-season { border-color: var(--accent-gold); color: var(--accent-gold); background: var(--accent-gold-dim); }

  .rating-group { display: flex; gap: 12px; font-size: 18px; color: var(--border-light); cursor: pointer; user-select: none; justify-content: center; padding: 10px 0;}
  .star.active { color: var(--accent-gold); }

  .modal-actions { display: flex; gap: 16px; margin-top: 40px; }
  .btn-cancel { flex: 1; padding: 12px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
  .btn-save { flex: 2; padding: 12px; background: var(--text-primary); border: none; border-radius: 30px; color: var(--bg-dark); font-weight: 500; cursor: pointer; font-size: 9px; letter-spacing: 2px; text-transform: uppercase; }
  
  .empty-state-text { text-align: center; padding: 60px 0; font-family: var(--font-serif); font-style: italic; color: var(--text-secondary); font-size: 18px; }

  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  .tab-content { animation: fadeIn 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
</style>
</head>
<body>

<div class="pwa-toast" id="pwa-toast">
  <span>Install Sillage for the full app experience.</span>
  <button onclick="document.getElementById('pwa-toast').classList.remove('show')">Dismiss</button>
</div>

<div class="app" id="app"></div>

<script>
const SEASONS = [
  { key: 'summer', label: 'Summer',       icon: '☀' },
  { key: 'rainy',  label: 'Rainy/Windy',  icon: '☁' },
  { key: 'winter', label: 'Winter',        icon: '❄' },
  { key: 'spring', label: 'Spring',        icon: '✿' },
];
const STATUS = {
  owned:    { label: 'Curated' },
  tobuy:    { label: 'Wishlist' },
  research: { label: 'Discovery' },
};

let state = { frags: [], tab: 'wardrobe', modal: null, tempImgData: null, tempRating: 0 };

window.addEventListener('DOMContentLoaded', () => {
  if (window.matchMedia('(display-mode: browser)').matches) {
    setTimeout(() => { document.getElementById('pwa-toast').classList.add('show'); }, 2000);
  }
});

function load() {
  try { 
    const data = localStorage.getItem('sillage_frags_v7');
    if(data) state.frags = JSON.parse(data);
    else {
      const oldData = localStorage.getItem('sillage_frags_v6') || localStorage.getItem('sillage_frags_v5');
      if(oldData) {
        let parsed = JSON.parse(oldData);
        state.frags = parsed.map(f => ({
          ...f,
          status: f.status === 'decided' ? 'tobuy' : (f.status === 'zone' ? 'research' : f.status),
          dateAdded: f.dateAdded || Date.now(),
          rating: f.rating || 0
        }));
      }
    }
  } catch {}
}
function save() {
  try { localStorage.setItem('sillage_frags_v7', JSON.stringify(state.frags)); } catch(e) { }
}

function uid() { return Math.random().toString(36).substr(2, 9); }

function getStars(rating) {
  if (!rating) return '';
  const full = '★'.repeat(rating);
  const empty = '★'.repeat(5 - rating);
  return `<div class="stars">${full}<span class="stars-empty">${empty}</span></div>`;
}

function renderImageOrSVG(frag) {
  if (frag && frag.imgData && frag.imgData.trim() !== '') {
    return `<img src="${frag.imgData}" class="frag-img" alt="${esc(frag.name)}">`;
  }
  return `<svg width="18" height="28" viewBox="0 0 22 34" fill="none" stroke="currentColor" stroke-width="1.5" style="color:var(--text-secondary); opacity:0.3;">
    <rect x="8" y="0" width="6" height="4" fill="none"/>
    <path d="M5 8 L4 14 L4 31 L18 31 L18 14 L17 8 Z"/>
    <path d="M6 8 L16 8"/>
  </svg>`;
}

function renderWardrobe() {
  const owned = state.frags.filter(f => f.status === 'owned');
  return SEASONS.map(season => {
    const sfrags = owned.filter(f => f.season === season.key);
    const slots = Array.from({length: 3}, (_, i) => {
      const f = sfrags[i];
      if (f) {
        return `
        <div class="frag-card">
          <div class="slot filled">
            <div class="slot-img-wrap">${renderImageOrSVG(f)}</div>
            <div class="slot-actions">
              <button class="action-btn" data-action="edit" data-id="${f.id}">Edit</button>
              <button class="action-btn delete" data-action="delete" data-id="${f.id}">Remove</button>
            </div>
          </div>
          <div class="slot-details">
            <div class="slot-name">${esc(f.name)}</div>
            <div class="slot-house">${esc(f.house)}</div>
            ${getStars(f.rating)}
          </div>
        </div>`;
      } else {
        const canAdd = owned.length < 12;
        return `
        <div class="frag-card empty-card" ${canAdd ? `data-action="add-season" data-season="${season.key}"` : ''}>
          <div class="slot empty">
            <div class="empty-icon">${canAdd ? '+' : '✕'}</div>
          </div>
          <div class="slot-details">
            <div class="slot-house">${canAdd ? 'OPEN SLOT' : 'MAX CAPACITY'}</div>
          </div>
        </div>`;
      }
    }).join('');
    
    return `<div class="season">
      <div class="season-header">
        <div class="season-title"><span>${season.icon}</span> ${season.label}</div>
        <div class="season-count">${sfrags.length} / 3</div>
      </div>
      <div class="slots">${slots}</div>
    </div>`;
  }).join('');
}

function renderList(statusKey) {
  const list = state.frags.filter(f => f.status === statusKey);
  if (!list.length) return `<div class="empty-state-text">Nothing to display here.</div>`;
  
  return `<div class="frag-list">${list.map(f => {
    let timeLabel = '';
    if(statusKey === 'research') {
        const days = Math.floor((Date.now() - (f.dateAdded || Date.now())) / (1000 * 60 * 60 * 24));
        if(days < 14) timeLabel = `<div class="badge cooling">${14-days} days cooling off</div>`;
        else timeLabel = `<div class="badge ready">Ready to Acquire</div>`;
    }

    return `
    <div class="frag-item">
      <div class="slot-img-wrap" style="height:70px; width:45px;">${renderImageOrSVG(f)}</div>
      <div class="frag-item-info">
        <div class="frag-item-house">${esc(f.house)}</div>
        <div class="frag-item-name">${esc(f.name)}</div>
        ${f.notes ? `<div class="frag-item-notes">${esc(f.notes)}</div>` : ''}
        ${timeLabel}
      </div>
      <div style="display:flex; flex-direction:column; gap:12px;">
        <button style="background:none;border:none;color:var(--text-secondary);cursor:pointer;" data-action="edit" data-id="${f.id}">✎</button>
        <button style="background:none;border:none;color:#5a1a1a;cursor:pointer;" data-action="delete" data-id="${f.id}">✕</button>
      </div>
    </div>`}).join('')}</div>`;
}

function renderModal() {
  if (!state.modal) return '';
  const { frag, editing } = state.modal;
  const isOwned = frag.status === 'owned';
  const imgSrc = state.tempImgData || frag.imgData || '';

  return `<div class="modal-overlay active" id="modal-overlay">
    <div class="modal">
      <div class="modal-title">${editing ? 'Edit Entry' : 'New Addition'}</div>
      
      <div class="field">
        <label class="field-label">Fragrance Name</label>
        <input class="field-input" id="inp-name" placeholder="e.g. Liquid Brun" value="${esc(frag.name)}" autocomplete="off" spellcheck="false" style="text-transform: capitalize;">
      </div>
      
      <div class="field">
        <label class="field-label">Perfume House</label>
        <input class="field-input" id="inp-house" placeholder="e.g. French Avenue" value="${esc(frag.house)}" autocomplete="off" spellcheck="false" style="text-transform: uppercase;">
      </div>
      
      <div class="field">
        <label class="field-label">Bottle Image</label>
        <div class="img-upload-container">
          <div class="img-preview-box">
             ${imgSrc ? `<img id="modal-img-preview" src="${imgSrc}">` : '<span id="modal-img-placeholder" style="color:#333">+</span>'}
             <img id="modal-img-preview" src="" style="display:none;">
          </div>
          <label class="file-btn">
            Select Photo
            <input type="file" class="file-input" id="inp-file" accept="image/*">
          </label>
        </div>
      </div>

      <div class="field">
        <label class="field-label">Category</label>
        <div class="seg-group">
          ${Object.entries(STATUS).map(([k,v]) =>
            `<button class="seg-btn${frag.status===k?' active-status':''}" data-action="set-status" data-val="${k}">${v.label}</button>`
          ).join('')}
        </div>
      </div>
      
      ${isOwned ? `
      <div class="field" id="season-field">
        <label class="field-label">Primary Season</label>
        <div class="season-grid">
          ${SEASONS.map(s =>
            `<button class="seg-btn${frag.season===s.key?' active-season':''}" data-action="set-season" data-val="${s.key}">${s.label}</button>`
          ).join('')}
        </div>
      </div>
      <div class="field">
        <label class="field-label">Personal Rating</label>
        <div class="rating-group" id="rating-group">
          ${[1,2,3,4,5].map(i => `<span class="star ${i <= state.tempRating ? 'active' : ''}" data-val="${i}">★</span>`).join('')}
        </div>
      </div>
      ` : ''}
      
      <div class="field">
        <label class="field-label">Notes & Impressions</label>
        <input class="field-input" id="inp-notes" placeholder="Warm vanilla, subtle cardamom..." value="${esc(frag.notes||'')}" autocomplete="off" spellcheck="false">
      </div>
      
      <div class="modal-actions">
        <button class="btn-cancel" data-action="close-modal">Cancel</button>
        <button class="btn-save" id="btn-save" data-action="save-modal" ${!frag.name.trim() ? 'disabled' : ''}>Save to Ledger</button>
      </div>
    </div>
  </div>`;
}

function render() {
  const owned = state.frags.filter(f => f.status === 'owned');
  const tobuy = state.frags.filter(f => f.status === 'tobuy');
  const research = state.frags.filter(f => f.status === 'research');
  const count = owned.length;

  document.getElementById('app').innerHTML = `
    <div class="header">
      <div class="header-eyebrow">Olfactory Ledger</div>
      <h1 class="header-title">Sillage</h1>
      <div class="header-count">
        <span class="count-num">${count}</span> OF 12 CURATED
      </div>
      <div class="divider"></div>
    </div>

    <div class="tabs">
      <button class="tab-btn${state.tab==='wardrobe'?' active':''}" data-action="tab" data-val="wardrobe">Wardrobe</button>
      <button class="tab-btn${state.tab==='tobuy'?' active':''}" data-action="tab" data-val="tobuy">Wishlist</button>
      <button class="tab-btn${state.tab==='research'?' active':''}" data-action="tab" data-val="research">Discovery</button>
    </div>

    <div class="tab-content">
      ${state.tab === 'wardrobe' ? renderWardrobe() : ''}
      ${state.tab === 'tobuy' ? renderList('tobuy') : ''}
      ${state.tab === 'research' ? renderList('research') : ''}
    </div>

    <div class="fab-wrap">
      <button class="add-btn" data-action="open-modal">Add Entry</button>
    </div>

    ${renderModal()}
  `;
  bindInputs();
}

function bindInputs() {
  const nameInp = document.getElementById('inp-name');
  const saveBtn = document.getElementById('btn-save');
  const fileInp = document.getElementById('inp-file');
  const ratingGroup = document.getElementById('rating-group');

  if (nameInp && saveBtn) { nameInp.addEventListener('input', () => { saveBtn.disabled = !nameInp.value.trim(); }); }

  if (fileInp) {
    fileInp.addEventListener('change', function(e) {
      const file = e.target.files[0];
      if(!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const MAX_HEIGHT = 150; 
          const scaleSize = MAX_HEIGHT / img.height;
          canvas.height = MAX_HEIGHT;
          canvas.width = img.width * scaleSize;
          const ctx = canvas.getContext('2d');
          
          // Fill black background so transparent PNGs don't look weird
          ctx.fillStyle = '#000000';
          ctx.fillRect(0, 0, canvas.width, canvas.height);
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
          
          const dataUrl = canvas.toDataURL('image/jpeg', 0.8); 
          state.tempImgData = dataUrl;
          
          const preview = document.getElementById('modal-img-preview');
          const placeholder = document.getElementById('modal-img-placeholder');
          if(placeholder) placeholder.style.display = 'none';
          preview.src = dataUrl;
          preview.style.display = 'block';
        }
        img.src = event.target.result;
      }
      reader.readAsDataURL(file);
    });
  }

  if (ratingGroup) {
    ratingGroup.addEventListener('click', e => {
      if(e.target.classList.contains('star')) {
        state.tempRating = parseInt(e.target.dataset.val);
        render(); 
      }
    });
  }
}

function esc(str) { return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

document.addEventListener('click', e => {
  const el = e.target.closest('[data-action]');
  if (!el) return;
  const action = el.dataset.action;

  if (action === 'tab') { state.tab = el.dataset.val; render(); }
  else if (action === 'open-modal' || action === 'add-season') {
    state.modal = { frag: { name:'', house:'', season: el.dataset.season || 'summer', status:'owned', notes:'', imgData:'' }, editing: false };
    state.tempImgData = null; state.tempRating = 0; render();
  }
  else if (action === 'edit') {
    const f = state.frags.find(x => x.id === el.dataset.id);
    if (f) { state.modal = { frag: {...f}, editing: true, id: f.id }; state.tempImgData = f.imgData || null; state.tempRating = f.rating || 0; render(); }
  }
  else if (action === 'delete') { state.frags = state.frags.filter(x => x.id !== el.dataset.id); save(); render(); }
  else if (action === 'close-modal') { state.modal = null; render(); }
  else if (action === 'set-status') { state.modal.frag.status = el.dataset.val; render(); }
  else if (action === 'set-season') { state.modal.frag.season = el.dataset.val; render(); }
  else if (action === 'save-modal') {
    const name = (document.getElementById('inp-name')?.value || '').trim();
    const house = (document.getElementById('inp-house')?.value || '').trim();
    const notes = document.getElementById('inp-notes')?.value.trim() || '';
    if (!name) return;
    const { editing, id, frag } = state.modal;
    const updated = { ...frag, name, house, notes, imgData: state.tempImgData, rating: state.tempRating, dateAdded: frag.dateAdded || Date.now() };
    if (editing) { state.frags = state.frags.map(f => f.id === id ? { ...updated, id } : f); } 
    else { state.frags.push({ ...updated, id: uid() }); }
    state.modal = null; save(); render();
  }
});

document.addEventListener('click', e => { if (e.target.id === 'modal-overlay') { state.modal = null; render(); } });

load(); render();
</script>
</body>
